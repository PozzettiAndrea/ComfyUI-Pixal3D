[test]
levels = ["syntax", "install", "registration", "instantiation", "execution"]
publish = true

[test.workflows]
# Pixal3D is pixel-aligned image-to-3D (Tencent ARC, SIGGRAPH 2026). The
# basic workflow loads HF-hosted weights + decodes a textured GLB, so it
# runs on GPU only. CPU platforms are disabled below for the same reason.
timeout = 600
cpu = []
gpu = ["pixal3d_basic"]

[test.platforms]
linux = false
macos = false
windows = false
windows_portable = false
linux_gpu = true
windows_gpu = true
windows_portable_gpu = true
windows_desktop_gpu = true
